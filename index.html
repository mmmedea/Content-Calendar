<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Flax + Beets — Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root{
  --g900:#1B3D2C;--g700:#2D6A4F;--g500:#52B788;--g200:#B7E4C7;--g100:#D8F3DC;--g50:#F0FAF2;
  --a900:#7D4E00;--a100:#FFF3CD;
  --b900:#0A3D6B;--b100:#DBEAFE;
  --p900:#3B0764;--p100:#EDE9FE;
  --r100:#FEE2E2;
  --gray900:#111827;--gray700:#374151;--gray600:#4B5563;--gray500:#6B7280;
  --gray400:#9CA3AF;--gray300:#D1D5DB;--gray200:#E5E7EB;--gray100:#F3F4F6;--gray50:#F9FAFB;
  --white:#fff;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:#EEF1EB;color:var(--gray900);min-height:100vh}
input,textarea,select,button{font-family:'DM Sans',sans-serif}

/* HEADER */
.header{background:var(--g700);padding:24px 20px 20px;display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.05);top:-120px;right:-60px;pointer-events:none}
.h-left .eyebrow{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px}
.h-left h1{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;font-weight:400;line-height:1.1;margin-bottom:3px}
.h-left .period{font-size:12px;color:rgba(255,255,255,.6)}
.h-right{display:flex;gap:6px;flex-wrap:wrap;position:relative;z-index:1}
.h-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;color:#fff;white-space:nowrap}
.h-chip.green{background:rgba(82,183,136,.3)}
.h-chip.amber{background:rgba(212,160,23,.25)}

/* MOBILE NAV */
.mob-nav{display:none;background:var(--white);border-bottom:1px solid var(--gray200);overflow-x:auto;-webkit-overflow-scrolling:touch}
.mob-nav-inner{display:flex;min-width:max-content}
.mob-tab{padding:12px 20px;font-size:12px;font-weight:500;color:var(--gray500);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.mob-tab.active{color:var(--g700);border-bottom-color:var(--g700)}

/* LAYOUT */
.page{display:grid;grid-template-columns:210px 1fr;gap:16px;padding:16px 20px 60px;align-items:start}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:12px;position:sticky;top:16px}
.s-card{background:var(--white);border:1px solid var(--gray200);border-radius:var(--radius);padding:14px 16px}
.s-title{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray500);display:flex;align-items:center;gap:6px;margin-bottom:10px}
.s-title::before{content:'';width:3px;height:13px;background:var(--g700);border-radius:2px;display:block;flex-shrink:0}
.t-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.t-name{color:var(--gray500)}.t-name.b{color:var(--gray900);font-weight:600}
.t-val{font-weight:600;color:var(--g700)}.t-val.z{color:var(--gray300);font-weight:400}
.t-div{height:1px;background:var(--gray100);margin:5px 0}
.s-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;flex-shrink:0}
.t-left{display:flex;align-items:center}
.add-btn{width:100%;margin-top:8px;padding:9px;border-radius:8px;background:var(--g700);color:#fff;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:.15s}
.add-btn:hover{background:var(--g900)}
.help-card{background:var(--g50);border:1px solid var(--g200);border-radius:var(--radius);padding:12px 14px;font-size:11px;color:var(--g900);line-height:1.65}
.help-card strong{display:block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--g700);margin-bottom:5px}

/* GRID */
.sec-hdr{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray500);display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:2px}
.sec-hdr::before{content:'';width:3px;height:13px;background:var(--g700);border-radius:2px;display:block}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}

/* CARD */
.card{background:var(--white);border:1px solid var(--gray200);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.card.ideation{border-style:dashed;opacity:.85}
.card-accent{height:4px;flex-shrink:0}
.card-actions{display:flex;justify-content:flex-end;padding:4px 10px 0}
.del-btn{background:none;border:none;color:var(--gray300);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:4px;transition:.15s;line-height:1}
.del-btn:hover{color:#EF4444;background:var(--r100)}
.card-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex:1}

/* BADGES */
.badge{display:inline-flex;align-items:center;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:500;white-space:nowrap}
.badge-green{background:var(--g100);color:var(--g900)}
.badge-green2{background:#D1FAE5;color:#065F46}
.badge-amber{background:var(--a100);color:var(--a900)}
.badge-blue{background:var(--b100);color:var(--b900)}
.badge-purple{background:var(--p100);color:var(--p900)}
.badge-gray{background:var(--gray100);color:var(--gray700)}

/* FIELDS */
.card-top{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.date-input{font-size:12px;font-weight:600;color:var(--gray900);border:none;background:transparent;outline:none;max-width:120px;cursor:pointer;padding:1px 4px;border-radius:4px}
.date-input:focus{background:var(--gray100)}
.fl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray300);margin-bottom:2px}
.editable{width:100%;border:1px solid transparent;border-radius:5px;padding:5px 7px;font-size:11.5px;color:var(--gray700);line-height:1.65;background:transparent;resize:none;outline:none;transition:.15s;min-height:44px}
.editable:focus{border-color:var(--g500);background:var(--g50)}
.editable::placeholder{color:var(--gray300);font-style:italic}
.editable.caption{min-height:72px}
.editable.hash{color:#1E6BB8;min-height:32px}
.editable.cta{color:var(--g700);min-height:32px}
.cta-wrap{background:var(--g50);border-left:3px solid var(--g500);border-radius:0 5px 5px 0;padding:2px 7px 2px 2px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dd-wrap{position:relative}
.status-sel{font-size:11px;border:1px solid var(--gray200);border-radius:5px;padding:5px 24px 5px 7px;background:var(--white);outline:none;cursor:pointer;color:var(--gray700);width:100%;-webkit-appearance:none;appearance:none}
.status-sel:focus{border-color:var(--g500)}
.dd-wrap::after{content:'▾';position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--gray400);pointer-events:none}
.plat-checks{display:flex;gap:6px;flex-wrap:wrap}
.plat-check{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--gray600);cursor:pointer;user-select:none}
.plat-check input{accent-color:var(--g700);cursor:pointer;width:13px;height:13px}

/* IMAGE */
.img-slot{border:1.5px dashed var(--gray300);border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px;cursor:pointer;transition:.15s;position:relative;overflow:hidden;min-height:58px;text-align:center}
.img-slot:hover{border-color:var(--g500);background:var(--g50)}
.img-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-slot .thumb{width:100%;max-height:68px;object-fit:cover;border-radius:4px;display:none}
.img-slot .img-hint{font-size:10px;color:var(--gray400);line-height:1.4;pointer-events:none}
.img-slot .img-icon{font-size:15px;opacity:.4;pointer-events:none}
.img-slot.has-img .img-hint,.img-slot.has-img .img-icon{display:none}
.img-slot.has-img .thumb{display:block}
.remove-img{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2;line-height:1}
.img-slot.has-img .remove-img{display:flex}

/* COMMENT */
.comment-zone{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--gray50);border-top:1px solid var(--gray100);margin-top:auto}
.c-avatar{width:20px;height:20px;border-radius:50%;background:var(--g100);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.c-avatar svg{width:10px;height:10px;opacity:.45}
.comment-input{flex:1;border:none;background:transparent;font-size:10px;color:var(--gray700);outline:none;min-width:0}
.comment-input::placeholder{color:var(--gray300)}
.comment-kbd{font-size:9px;background:var(--gray100);color:var(--gray500);border-radius:3px;padding:1px 5px;font-weight:600;flex-shrink:0}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 20px 36px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.modal-handle{width:36px;height:4px;background:var(--gray200);border-radius:2px;margin:0 auto 16px}
.modal h2{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--gray500);margin-bottom:14px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-field{display:flex;flex-direction:column;gap:4px}
.modal-field.full{grid-column:1/-1}
.modal-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray500)}
.modal-input{border:1px solid var(--gray200);border-radius:7px;padding:10px 12px;font-size:14px;outline:none;color:var(--gray900);width:100%;-webkit-appearance:none;appearance:none}
.modal-input:focus{border-color:var(--g500)}
.modal-input.ta{min-height:70px;resize:vertical}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--g700);color:#fff}
.btn-primary:active{background:var(--g900)}
.btn-ghost{background:var(--gray100);color:var(--gray700)}
.modal-check-row{display:flex;gap:14px;flex-wrap:wrap;padding-top:2px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gray900);color:#fff;padding:10px 22px;border-radius:30px;font-size:12px;font-weight:500;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FAB (mobile) */
.fab{display:none;position:fixed;bottom:24px;right:18px;width:52px;height:52px;border-radius:50%;background:var(--g700);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(45,106,79,.45);z-index:100;align-items:center;justify-content:center;line-height:1}
.fab:active{background:var(--g900);transform:scale(.95)}

/* TABLET */
@media(max-width:900px){
  .page{grid-template-columns:185px 1fr;gap:12px;padding:12px 16px 60px}
  .cards-grid{grid-template-columns:repeat(2,1fr)}
  .sidebar{position:static}
}

/* MOBILE */
@media(max-width:640px){
  .header{padding:16px 16px 14px}
  .h-left h1{font-size:22px}
  .mob-nav{display:block}
  .page{grid-template-columns:1fr;gap:0;padding:12px 12px 80px}
  .sidebar{display:none}
  .sidebar.mob-active{display:flex;margin-bottom:12px}
  .cards-grid{grid-template-columns:1fr;gap:10px}
  .two-col{grid-template-columns:1fr}
  .modal-grid{grid-template-columns:1fr}
  .modal-field.full{grid-column:1}
  .fab{display:flex}
  .add-btn,.help-card{display:none}
  .status-sel,.modal-input{font-size:16px}
  .editable{font-size:14px}
  .date-input{font-size:13px}
}

/* SMALL MOBILE */
@media(max-width:360px){
  .h-right{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="h-left">
    <div class="eyebrow">Content Calendar</div>
    <h1>Flax + Beets</h1>
    <div class="period">April 2026 · Instagram &amp; Facebook</div>
  </div>
  <div class="h-right" id="h-chips"></div>
</div>

<div class="mob-nav">
  <div class="mob-nav-inner">
    <button class="mob-tab active" onclick="mobTab('posts',this)">📋 Posts</button>
    <button class="mob-tab" onclick="mobTab('tracker',this)">📊 Tracker</button>
  </div>
</div>

<div class="page">
  <div class="sidebar" id="sidebar">
    <div class="s-card">
      <div class="s-title">Platform Tracker</div>
      <div id="plat-tracker"></div>
    </div>
    <div class="s-card">
      <div class="s-title">Status Tracker</div>
      <div id="status-tracker"></div>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add Post</button>
    <div class="help-card">
      <strong>How to edit</strong>
      Tap any field on a card to edit. Trackers update instantly as you make changes.
    </div>
  </div>
  <div id="grid-area"></div>
</div>

<button class="fab" onclick="openModal()" aria-label="Add post">+</button>
<div class="toast" id="toast">Saved ✓</div>

<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Add New Post</h2>
    <p class="modal-sub">Fill in the details for your new content post.</p>
    <div class="modal-grid">
      <div class="modal-field">
        <label class="modal-label">Date</label>
        <input class="modal-input" id="m-date" type="date"/>
      </div>
      <div class="modal-field">
        <label class="modal-label">Theme</label>
        <select class="modal-input" id="m-theme">
          <option>Educational</option><option>Social Proof</option>
          <option>Product/Brand</option><option>Promotional</option><option>Community</option>
        </select>
      </div>
      <div class="modal-field">
        <label class="modal-label">Status</label>
        <select class="modal-input" id="m-status">
          <option>Ideation</option><option>In-Progress</option>
          <option>Ready for Review</option><option>Scheduled</option><option>Published</option>
        </select>
      </div>
      <div class="modal-field">
        <label class="modal-label">Format</label>
        <select class="modal-input" id="m-format">
          <option>Carousel</option><option>Static Image</option>
          <option>Reel</option><option>Story</option><option>Video</option><option>TBD</option>
        </select>
      </div>
      <div class="modal-field full">
        <label class="modal-label">Platforms</label>
        <div class="modal-check-row">
          <label class="plat-check"><input type="checkbox" id="mp-ig" checked> Instagram</label>
          <label class="plat-check"><input type="checkbox" id="mp-fb" checked> Facebook</label>
          <label class="plat-check"><input type="checkbox" id="mp-li"> LinkedIn</label>
          <label class="plat-check"><input type="checkbox" id="mp-tw"> Twitter</label>
        </div>
      </div>
      <div class="modal-field full">
        <label class="modal-label">Caption</label>
        <textarea class="modal-input ta" id="m-caption" placeholder="Write your caption..."></textarea>
      </div>
      <div class="modal-field full">
        <label class="modal-label">CTA</label>
        <input class="modal-input" id="m-cta" placeholder="e.g. 💚 Save this post..."/>
      </div>
      <div class="modal-field full">
        <label class="modal-label">Hashtags</label>
        <input class="modal-input" id="m-hash" placeholder="#guthealth #flaxandbeets ..."/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addPost()">Add Post</button>
    </div>
  </div>
</div>

<script>
const STATUSES=['Ideation','In-Progress','Ready for Review','Scheduled','Published'];
const FORMATS=['Carousel','Static Image','Reel','Story','Video','TBD'];
const THEMES=['Educational','Social Proof','Product/Brand','Promotional','Community'];
const PLATFORMS=['Instagram','Facebook','LinkedIn','Twitter'];

let posts=[
  {id:1,date:'2026-04-17',platforms:['Instagram','Facebook'],theme:'Educational',caption:"Your gut didn't fail you. It changed — and so did the rules.\n\nAfter 40, estrogen levels drop. This can disrupt the gut bacteria that kept your digestion balanced for years.",cta:'💚 Save this and follow Flax + Beets for weekly gut health tips',hashtags:'#guthealth #probiotics #perimenopause #hormonehealth #womenover40',format:'Carousel',status:'Ready for Review',image:null},
  {id:2,date:'2026-04-18',platforms:['Instagram','Facebook'],theme:'Social Proof',caption:"10 years of digestive struggles. One product that finally made a difference.\n\nTheresa's story is more common than you might think.",cta:"💚 Have you tried Flax + Beets? Share your experience in the comments.",hashtags:'#guthealth #flaxandbeets #perimenopause #womenover40 #testimonial',format:'Static Image',status:'Ready for Review',image:null},
  {id:3,date:'2026-04-19',platforms:['Instagram','Facebook'],theme:'Educational',caption:"Most gut health supplements list 20+ ingredients but don't tell you how much of each one is included.\n\nThis is called a proprietary blend.",cta:"💚 Follow Flax + Beets. We share things the industry doesn't want you to ask.",hashtags:'#guthealth #supplements #cleansupplements #probiotics #flaxandbeets',format:'Reel',status:'Ready for Review',image:null},
  {id:4,date:'2026-04-20',platforms:['Instagram','Facebook'],theme:'Product/Brand',caption:"Most gut supplements give you one layer and call it a gut health product.\n\nFlax + Beets was built differently — because what your gut needs after 40 isn't a single ingredient.",cta:'💚 See the full ingredient breakdown — link in bio.',hashtags:'#guthealth #flaxandbeets #gutsupplement #digestivehealth #perimenopause',format:'Static Image',status:'Ready for Review',image:null},
  {id:5,date:'2026-04-21',platforms:['Instagram','Facebook'],theme:'Social Proof',caption:"You may have been told it's stress, aging, or just something you have to live with.\n\nBut you're not imagining it. 82% of women say their gut symptoms worsened during hormonal changes.",cta:"💚 Save this and share it with someone who needs to hear they're not imagining it.",hashtags:'#perimenopause #guthealth #womenshealth #hormonehealth #flaxandbeets',format:'Static Image',status:'Ready for Review',image:null},
  {id:6,date:'2026-04-14',platforms:['Instagram','Facebook'],theme:'Educational',caption:'',cta:'',hashtags:'',format:'TBD',status:'Ideation',image:null},
  {id:7,date:'2026-04-15',platforms:['Instagram','Facebook'],theme:'Social Proof',caption:'',cta:'',hashtags:'',format:'TBD',status:'Ideation',image:null},
  {id:8,date:'2026-04-16',platforms:['Instagram','Facebook'],theme:'Educational',caption:'',cta:'',hashtags:'',format:'TBD',status:'Ideation',image:null},
  {id:9,date:'2026-04-17',platforms:['Instagram','Facebook'],theme:'Social Proof',caption:'',cta:'',hashtags:'',format:'TBD',status:'Ideation',image:null},
  {id:10,date:'2026-04-18',platforms:['Instagram','Facebook'],theme:'Product/Brand',caption:'',cta:'',hashtags:'',format:'TBD',status:'Ideation',image:null},
];
let nextId=11;

function themeClass(t){return t==='Educational'?'badge-blue':t==='Social Proof'?'badge-purple':t==='Product/Brand'?'badge-green':t==='Promotional'?'badge-amber':'badge-gray';}
function statusClass(s){return s==='Ready for Review'?'badge-green2':s==='Ideation'?'badge-amber':s==='In-Progress'?'badge-blue':s==='Scheduled'?'badge-green':s==='Published'?'badge-purple':'badge-gray';}
function statusColor(s){return s==='Ready for Review'?'#2D6A4F':s==='Ideation'?'#D4A017':s==='In-Progress'?'#1877F2':s==='Scheduled'?'#52B788':s==='Published'?'#7C3AED':'#9CA3AF';}

function updateSidebar(){
  const pc={};PLATFORMS.forEach(p=>pc[p]=0);
  posts.forEach(p=>p.platforms.forEach(pl=>{if(pc[pl]!==undefined)pc[pl]++;}));
  let ph='';
  PLATFORMS.forEach(p=>{const c=pc[p];ph+=`<div class="t-row"><span class="t-name">${p}</span><span class="t-val${c?'':' z'}">${c||'—'}</span></div>`;});
  ph+=`<div class="t-div"></div><div class="t-row"><span class="t-name b">Total</span><span class="t-val">${posts.length}</span></div>`;
  document.getElementById('plat-tracker').innerHTML=ph;
  const sc={};STATUSES.forEach(s=>sc[s]=0);
  posts.forEach(p=>{sc[p.status]=(sc[p.status]||0)+1;});
  let sh='';
  STATUSES.forEach(s=>{const c=sc[s]||0;sh+=`<div class="t-row"><span class="t-left"><span class="s-dot" style="background:${statusColor(s)}"></span><span class="t-name">${s}</span></span><span class="t-val${c?'':' z'}"${c?` style="color:${statusColor(s)}"`:''}">${c||'—'}</span></div>`;});
  document.getElementById('status-tracker').innerHTML=sh;
  const ready=posts.filter(p=>p.status==='Ready for Review').length;
  const idea=posts.filter(p=>p.status==='Ideation').length;
  const platSet=[...new Set(posts.flatMap(p=>p.platforms))];
  document.getElementById('h-chips').innerHTML=
    `<div class="h-chip">${posts.length} Posts</div>`+
    `<div class="h-chip">${platSet.length} Platform${platSet.length!==1?'s':''}</div>`+
    (ready?`<div class="h-chip green">${ready} ✓ Ready</div>`:'')+
    (idea?`<div class="h-chip amber">${idea} Ideation</div>`:'');
}

function renderAll(){
  const area=document.getElementById('grid-area');
  const active=posts.filter(p=>p.status!=='Ideation');
  const idea=posts.filter(p=>p.status==='Ideation');
  let html='';
  if(active.length){html+=`<div class="sec-hdr">Active Posts (${active.length})</div><div class="cards-grid">`;active.forEach(p=>{html+=cardHTML(p);});html+=`</div>`;}
  if(idea.length){html+=`<div class="sec-hdr">Ideation (${idea.length})</div><div class="cards-grid">`;idea.forEach(p=>{html+=cardHTML(p);});html+=`</div>`;}
  area.innerHTML=html;
  posts.forEach(p=>bindCard(p.id));
  updateSidebar();
}

function cardHTML(p){
  const isIdea=p.status==='Ideation';
  const fmtOpts=FORMATS.map(f=>`<option${f===p.format?' selected':''}>${f}</option>`).join('');
  const statOpts=STATUSES.map(s=>`<option${s===p.status?' selected':''}>${s}</option>`).join('');
  const themeOpts=THEMES.map(t=>`<option${t===p.theme?' selected':''}>${t}</option>`).join('');
  const platChecks=PLATFORMS.map(pl=>`<label class="plat-check"><input type="checkbox" data-id="${p.id}" data-plat="${pl}"${p.platforms.includes(pl)?' checked':''}> ${pl}</label>`).join('');
  const imgSlot=p.image
    ?`<div class="img-slot has-img"><img class="thumb" src="${p.image}" alt=""/><input type="file" accept="image/*" onchange="handleImg(event,${p.id})"/><button class="remove-img" onclick="event.stopPropagation();removeImg(${p.id})">✕</button></div>`
    :`<div class="img-slot"><span class="img-icon">🖼</span><span class="img-hint">Tap to upload image</span><input type="file" id="imgfile-${p.id}" accept="image/*" onchange="handleImg(event,${p.id})"/></div>`;
  return `<div class="card${isIdea?' ideation':''}" id="card-${p.id}">
  <div class="card-accent" id="ca-${p.id}" style="background:${statusColor(p.status)}"></div>
  <div class="card-actions"><button class="del-btn" onclick="deletePost(${p.id})" title="Delete">✕</button></div>
  <div class="card-body">
    <div class="card-top">
      <input class="date-input" type="date" value="${p.date}" onchange="updateField(${p.id},'date',this.value)"/>
      <span class="badge ${statusClass(p.status)}" id="sbadge-${p.id}">${p.status}</span>
      <span class="badge ${themeClass(p.theme)}" id="tbadge-${p.id}">${p.theme}</span>
    </div>
    <div><div class="fl">Platforms</div><div class="plat-checks" id="plats-${p.id}">${platChecks}</div></div>
    <div class="two-col">
      <div><div class="fl">Format</div><div class="dd-wrap"><select class="status-sel" onchange="updateField(${p.id},'format',this.value)">${fmtOpts}</select></div></div>
      <div><div class="fl">Status</div><div class="dd-wrap"><select class="status-sel" onchange="updateField(${p.id},'status',this.value)">${statOpts}</select></div></div>
    </div>
    <div><div class="fl">Theme</div><div class="dd-wrap"><select class="status-sel" onchange="updateField(${p.id},'theme',this.value)">${themeOpts}</select></div></div>
    <div><div class="fl">Caption</div><textarea class="editable caption" placeholder="Write your caption..." onchange="updateField(${p.id},'caption',this.value)" oninput="ar(this)">${esc(p.caption)}</textarea></div>
    <div class="cta-wrap"><div class="fl" style="padding:5px 7px 0">CTA</div><textarea class="editable cta" placeholder="Call to action..." onchange="updateField(${p.id},'cta',this.value)" oninput="ar(this)">${esc(p.cta)}</textarea></div>
    <div><div class="fl">Hashtags</div><textarea class="editable hash" placeholder="#hashtag1 #hashtag2..." onchange="updateField(${p.id},'hashtags',this.value)" oninput="ar(this)">${esc(p.hashtags)}</textarea></div>
    <div><div class="fl">Image / Visual</div>${imgSlot}</div>
  </div>
  <div class="comment-zone">
    <div class="c-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="#2D6A4F" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    <input class="comment-input" placeholder="Add a note..." type="text"/>
    <span class="comment-kbd">Note</span>
  </div>
</div>`;
}

function bindCard(id){
  const d=document.getElementById(`plats-${id}`);
  if(!d)return;
  d.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      const post=posts.find(p=>p.id===id);
      post.platforms=Array.from(d.querySelectorAll('input:checked')).map(c=>c.dataset.plat);
      updateSidebar();toast();
    });
  });
}

function updateField(id,field,val){
  const post=posts.find(p=>p.id===id);if(!post)return;
  post[field]=val;
  if(field==='status'||field==='theme'){
    document.getElementById(`ca-${id}`).style.background=statusColor(post.status);
    const sb=document.getElementById(`sbadge-${id}`);if(sb){sb.className=`badge ${statusClass(post.status)}`;sb.textContent=post.status;}
    const tb=document.getElementById(`tbadge-${id}`);if(tb){tb.className=`badge ${themeClass(post.theme)}`;tb.textContent=post.theme;}
    document.getElementById(`card-${id}`).className=`card${post.status==='Ideation'?' ideation':''}`;
    renderAll();return;
  }
  updateSidebar();toast();
}

function handleImg(e,id){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{posts.find(p=>p.id===id).image=ev.target.result;renderAll();toast('Image uploaded ✓');};
  r.readAsDataURL(file);
}
function removeImg(id){posts.find(p=>p.id===id).image=null;renderAll();}
function deletePost(id){if(!confirm('Delete this post?'))return;posts=posts.filter(p=>p.id!==id);renderAll();toast('Deleted');}
function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function openModal(){document.getElementById('modal-bg').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');document.body.style.overflow='';}
function bgClick(e){if(e.target===e.currentTarget)closeModal();}
function addPost(){
  const d=document.getElementById('m-date').value;
  if(!d){alert('Please pick a date');return;}
  const platMap={ig:'Instagram',fb:'Facebook',li:'LinkedIn',tw:'Twitter'};
  const plats=Object.entries(platMap).filter(([k])=>document.getElementById(`mp-${k}`).checked).map(([,v])=>v);
  if(!plats.length){alert('Select at least one platform');return;}
  posts.push({id:nextId++,date:d,platforms:plats,theme:document.getElementById('m-theme').value,caption:document.getElementById('m-caption').value,cta:document.getElementById('m-cta').value,hashtags:document.getElementById('m-hash').value,format:document.getElementById('m-format').value,status:document.getElementById('m-status').value,image:null});
  ['m-date','m-caption','m-cta','m-hash'].forEach(id=>{document.getElementById(id).value='';});
  closeModal();renderAll();toast('Post added ✓');
}

function mobTab(tab,btn){
  document.querySelectorAll('.mob-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const sb=document.getElementById('sidebar');
  const ga=document.getElementById('grid-area');
  if(tab==='tracker'){sb.classList.add('mob-active');ga.style.display='none';}
  else{sb.classList.remove('mob-active');ga.style.display='';}
}

let toastTimer;
function toast(msg='Saved ✓'){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

renderAll();
</script>
</body>
</html>
